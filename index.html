// STORAGE
function todayKey(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function getH(k){try{return JSON.parse(localStorage.getItem('pv_h_'+k)||'{}');}catch(e){return {};}}
function setH(k,v){localStorage.setItem('pv_h_'+k,JSON.stringify(v));}
function getJ(){try{return JSON.parse(localStorage.getItem('pv_j')||'{}');}catch(e){return {};}}
function setJE(k,v){var d=getJ();d[k]=v;localStorage.setItem('pv_j',JSON.stringify(d));}
function getGD(){try{return JSON.parse(localStorage.getItem('pv_g')||'{}');}catch(e){return {};}}
function setGD(v){localStorage.setItem('pv_g',JSON.stringify(v));}
function calcStreak(){
  var s=0,t=new Date();
  for(var i=0;i<365;i++){
    var d=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);
    var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var h=getH(k);
    if(HABITS.filter(function(x){return h[x.id];}).length===HABITS.length){s++;}
    else if(i>0){break;}
  }
  return s;
}
function allDone(k){var h=getH(k);return HABITS.every(function(x){return !!h[x.id];});}

// NAV
var currentPage='overview';
function nav(page){
  currentPage=page;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+page).classList.add('on');
  document.querySelector('[data-page="'+page+'"]').classList.add('active');
  var r={overview:renderOverview,schedule:renderSchedule,habits:renderHabits,goals:renderGoals,journal:renderJournal};
  if(r[page])r[page]();
}
document.querySelectorAll('.nb').forEach(function(b){
  b.addEventListener('click',function(){nav(b.getAttribute('data-page'));});
});

    +'<div class="sc"><div class="sc-label">STREAK</div><div class="sc-val">'+streak+'</div><div class="sc-sub">days in a row</div></div>'
    +'<div class="sc"><div class="sc-label">GOALS ACTIVE</div><div class="sc-val">6</div><div class="sc-sub">all systems go</div></div>'
    +'</div>'
    +'<div class="card"><div class="slabel">TODAY\'S ANCHORS</div>'
    +anchors.map(function(a){return '<div style="display:flex;align-items:center;gap:14px;padding:7px 0;border-bottom:1px solid var(--borderl)"><span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);width:68px;flex-shrink:0">'+a.t+'</span><span style="font-size:12px">'+a.l+'</span></div>';}).join('')
    +'<br><button class="btn btn-g" onclick="nav(\'schedule\')">VIEW FULL SCHEDULE &rarr;</button></div>'
    +'<div class="card"><div class="flex-b" style="margin-bottom:13px"><div class="slabel" style="margin:0">QUICK HABITS</div><span style="font-size:10px;color:var(--muted);font-family:\'DM Mono\',monospace">'+done+'/'+HABITS.length+'</span></div>'

    +x.label+'</span>'+(isDone?'<span style="margin-left:auto;font-size:9px;color:var(--green);font-family:\'DM Mono\',monospace">DONE</span>':'')+'</div>';}).join('')
    +'<br><button class="btn btn-g" onclick="nav(\'habits\')">FULL CHECKLIST &rarr;</button></div>';

var expB={};

    +'<div class="tabs">'+tabs.map(function(t){return '<button class="tb'+(t===activeSched?' active':'')+'" onclick="switchSched(\''+t+'\')">'+t+'<br><span style="font-size:8px;opacity:.6;font-weight:300">'+SCHED[t].sub+'</span></button>';}).join('')+'</div>'

function switchSched(t){activeSched=t;renderSchedule();}
function toggleTL(s,i){var k=s+'_'+i;expB[k]=!expB[k];renderSchedule();}

// HABITS
var calY=new Date().getFullYear(),calM=new Date().getMonth();
function renderHabits(){
  var k=todayKey(),h=getH(k);
  var done=HABITS.filter(function(x){return h[x.id];}).length;
  var pct=Math.round(done/HABITS.length*100);
  var streak=calcStreak();
  var n=new Date();
  var html='<div class="flex-b" style="margin-bottom:4px"><div><h1 class="ptitle">Habits &amp; Streak</h1><p class="psub">RESETS DAILY &middot; BUILD THE IDENTITY</p></div>'
    +'<div style="text-align:right"><div class="streak-n">'+streak+'</div><div style="font-family:\'DM Mono\',monospace;font-size:8px;letter-spacing:.16em;color:var(--muted)">DAY STREAK</div></div></div>'
    +'<div class="pw" style="margin-bottom:20px"><div class="pb" style="width:'+pct+'%"></div></div>'
    +'<div class="card" style="margin-bottom:13px"><div class="flex-b" style="margin-bottom:13px">'
    +'<div class="slabel" style="margin:0">TODAY &mdash; '+n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()+'</div>'
    +'<span style="font-size:10px;color:var(--muted);font-family:\'DM Mono\',monospace">'+done+'/'+HABITS.length+' COMPLETE</span></div>'
    +HABITS.map(function(x){var isDone=!!h[x.id];return '<div class="hi'+(isDone?' done':'')+'" onclick="toggleHabit(\''+x.id+'\')">'
      +'<div class="hck"><span class="htick">&#10003;</span></div>'
      +'<span style="font-size:16px">'+x.icon+'</span>'
      +'<span class="hlbl">'+x.label+'</span></div>';}).join('')
    +'</div>'
    +'<div class="card"><div class="flex-b" style="margin-bottom:4px"><div class="slabel" style="margin:0">STREAK CALENDAR</div>'
    +'<div style="display:flex;gap:5px"><button onclick="calNav(-1)" class="btn btn-g" style="padding:4px 10px">&#8249;</button><button onclick="calNav(1)" class="btn btn-g" style="padding:4px 10px">&#8250;</button></div></div>'
    +'<div id="cal-ml" style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:.13em"></div>'
    +'<div class="cgrid" id="cal-g"></div>'
    +'<div style="display:flex;gap:15px;margin-top:11px">'
    +'<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--primary)"></div><span style="font-size:9px;color:var(--muted);font-family:\'DM Mono\',monospace">ALL DONE</span></div>'
    +'<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;border:1.5px solid var(--primary)"></div><span style="font-size:9px;color:var(--muted);font-family:\'DM Mono\',monospace">TODAY</span></div>'
    +'</div></div>';
  document.getElementById('page-habits').innerHTML=html;
  renderCal();
}
function toggleHabit(id){var k=todayKey(),h=getH(k);h[id]=!h[id];setH(k,h);renderHabits();}
function renderCal(){
  var MOS=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  var lbl=document.getElementById('cal-ml'),grid=document.getElementById('cal-g');
  if(!lbl||!grid)return;
  lbl.textContent=MOS[calM]+' '+calY;
  var first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),today=todayKey();
  var DN=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var html=DN.map(function(d){return '<div class="chdr">'+d+'</div>';}).join('');
  for(var i=0;i<first;i++)html+='<div class="cd empty"></div>';
  for(var d=1;d<=days;d++){
    var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isT=ds===today,isDone=allDone(ds);
    html+='<div class="cd'+(isDone?' done':'')+(isT?' today':'')+'">'+d+'</div>';
  }
  grid.innerHTML=html;
}
function calNav(dir){calM+=dir;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

// GOALS
var expGoal=null;
function renderGoals(){
  var gd=getGD();
  var html='<h1 class="ptitle">6 Goals &middot; 2026</h1><p class="psub">THE MISSION &middot; TAP TO EXPAND &middot; TICK EACH STEP</p>';
  GOALS.forEach(function(g,gi){
    var gsd=gd[g.id]||{};
    var doneCt=g.steps.filter(function(s,si){return gsd[si];}).length;
    var prog=Math.max(g.prog,Math.round(doneCt/g.steps.length*100));
    var isOpen=expGoal===gi;
    html+='<div class="gc" style="border-left:3px solid '+g.color+'">'
      +'<div class="gh" onclick="toggleGoal('+gi+')">'
      +'<span class="gico">'+g.icon+'</span>'
      +'<div class="gm"><div class="gcat" style="color:'+g.color+'">'+g.cat+'</div>'
      +'<div class="gtit">'+g.title+'</div>'
      +'<div class="pw"><div class="pb" style="width:'+prog+'%;background:'+g.color+'"></div></div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">'
      +'<span style="font-family:\'Playfair Display\',serif;font-size:20px;font-weight:700;color:'+g.color+'">'+prog+'%</span>'
      +'<span style="font-size:10px;color:var(--muted)">'+(isOpen?'&#9650;':'&#9660;')+'</span></div></div>'
      +'<div class="gb'+(isOpen?' open':'')+'">'
      +'<p class="gdesc">'+g.desc+'</p>'
      +'<div class="slabel">STEPS TO COMPLETE</div>'
      +g.steps.map(function(s,si){var isDone=!!gsd[si];return '<div class="si'+(isDone?' sd':'')+'" onclick="toggleStep('+g.id+','+si+');event.stopPropagation()">'
        +'<div class="sck"><span class="stk">&#10003;</span></div><span class="stxt">'+s+'</span></div>';}).join('')
      +'<div style="margin-top:9px;font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted)">'+doneCt+'/'+g.steps.length+' STEPS COMPLETED</div>'
      +'</div></div>';
  });
  document.getElementById('page-goals').innerHTML=html;
}
function toggleGoal(gi){expGoal=expGoal===gi?null:gi;renderGoals();}
function toggleStep(gid,si){var gd=getGD();if(!gd[gid])gd[gid]={};gd[gid][si]=!gd[gid][si];setGD(gd);renderGoals();}

// JOURNAL
function renderJournal(){
  var n=new Date(),k=todayKey(),entries=getJ();
  var prompt=FR_PROMPTS[n.getDate()%FR_PROMPTS.length];
  var existing=entries[k]||'';
  var html='<h1 class="ptitle">Journal</h1><p class="psub">EN FRAN&Ccedil;AIS &middot; CHAQUE SOIR &middot; SANS EXCEPTION</p>'
    +'<div class="card"><div class="slabel">AUJOURD\'HUI &mdash; '+n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase()+'</div>'
    +'<div class="jp">'+prompt+'</div>'
    +'<textarea class="jta" id="j-ta" placeholder="Ecris librement. Pas de jugement ici. En francais...">'+existing+'</textarea>'
    +'<div style="margin-top:11px;display:flex;gap:10px;align-items:center">'
    +'<button class="btn btn-p" onclick="saveJ()">SAUVEGARDER</button>'
    +'<span id="j-msg" style="display:none;font-size:10px;color:var(--green);font-family:\'DM Mono\',monospace">&#10003; Sauvegarde</span>'
    +'</div></div>'
    +'<div class="slabel" style="margin-bottom:10px">ENTREES PRECEDENTES</div>';
  var past=Object.keys(entries).filter(function(x){return x!==k;}).sort().reverse();
  if(past.length===0){
    html+='<div style="text-align:center;padding:38px;color:var(--muted);font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:.14em;line-height:2">PAS ENCORE D\'ENTREES<br>Ecris ce soir.</div>';
  } else {
    past.forEach(function(pk){
      var d=new Date(pk+'T12:00:00');
      html+='<div class="je"><div class="je-d">'+d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase()+'</div>'
        +'<div class="je-t">'+entries[pk]+'</div></div>';
    });
  }
  document.getElementById('page-journal').innerHTML=html;
}
function saveJ(){
  var ta=document.getElementById('j-ta');
  if(!ta)return;
  var text=ta.value.trim();
  if(!text)return;
  setJE(todayKey(),text);
  var msg=document.getElementById('j-msg');
  if(msg){msg.style.display='inline';setTimeout(function(){msg.style.display='none';},2000);}
}
